<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TheWrkShop — {{TITLE}}</title>
  <link rel="stylesheet" href="../style.css"/>
  <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
  <meta name="description" content="{{TITLE}} — Daily devotional: scripture, reflection, and a practical next step."/>
  <style>
    .page-hero {
      background: #3e2c23;
      color: #f4f1ee;
      padding: 3rem 1rem;
      text-align: center;
    }

    .page-hero h1 {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      margin-bottom: .4rem;
    }

    .daily-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .daily-meta {
      display: flex;
      gap: .5rem;
      align-items: center;
      color: #6b5b53;
      margin-bottom: .75rem;
      flex-wrap: wrap;
    }

    .daily-card {
      background: #f4f1ee;
      color: #2b2b2b;
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      padding: 1.25rem;
      box-shadow: 0 2px 6px rgba(0,0,0,.07);
    }

    .daily-card h2 {
      color: #3e2c23;
      margin: .25rem 0 .35rem;
    }

    .verse-block {
      margin: .75rem 0;
      padding: .8rem 1rem;
      border-left: 4px solid #3e2c23;
      background: #fff;
      color: #2b2b2b;
      border-radius: 8px;
      line-height: 1.65;
    }

    .daily-section {
      margin-top: 1rem;
    }

    .daily-section h3 {
      color: #3e2c23;
      margin: 1rem 0 .4rem;
    }

    .daily-section h2 {
      color: #3e2c23;
      margin: 1rem 0 .4rem;
      font-size: 1.15rem;
    }

    .daily-section p {
      margin: .55rem 0;
      line-height: 1.65;
    }

    .daily-section ul,
    .daily-section ol {
      margin: .65rem 0 .65rem 1.2rem;
      padding-left: 1rem;
    }

    .daily-section li {
      margin: .4rem 0;
      line-height: 1.6;
    }

    .action-step {
      background: #fff;
      border: 1px dashed rgba(0,0,0,.18);
      border-radius: 10px;
      padding: .9rem 1rem;
      margin-top: .6rem;
      line-height: 1.6;
      white-space: pre-line;
    }

    .declaration-text {
      font-weight: 700;
      color: #3e2c23;
      line-height: 1.65;
      white-space: pre-line;
    }

    .nav-archive {
      display: flex;
      justify-content: space-between;
      gap: .5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .nav-archive a {
      text-decoration: none;
      color: #3e2c23;
      font-weight: 600;
    }

    .nav-archive a.is-disabled {
      opacity: .5;
      pointer-events: none;
    }

    blockquote {
      margin: .75rem 0;
      padding: .85rem 1rem;
      background: #fff;
      border-left: 4px solid #3e2c23;
      border-radius: 8px;
      font-style: italic;
      color: #3e2c23;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <h1>Daily</h1>
    <p>Scripture, reflection, and one clear step to live it out.</p>
  </section>

  <main class="daily-wrap">
    <article class="daily-card daily-article" id="dailyCard">
      <div class="daily-meta">
        <span class="badge">Hidden Gem</span>
        <time id="dDate" datetime="{{DATE}}">{{HUMAN_DATE}}</time>
        <button class="listen-btn" id="listenDailyBtn">🔊 Listen</button>
      </div>

      <h2 id="dTitle">{{TITLE}}</h2>

      <div class="verse-block" id="dVerseBlock">
        <div id="dVerse">{{VERSE_TEXT}}</div>
      </div>

      <div id="dSections">
        {{INSIGHT_HTML}}
      </div>

      <section class="daily-section">
        <h3>Action Step</h3>
        <div class="action-step" id="dActionStep">{{ONE_MINUTE_WIN}}</div>
      </section>

      <section class="daily-section">
        <h3>Declaration</h3>
        <p class="declaration-text" id="dDeclaration">{{DECLARATION}}</p>
      </section>

      <div class="nav-archive">
        <a href="{{PREV_HREF}}" id="prevDay">← Previous</a>
        <a href="../daily-archive.html">See Archive →</a>
        <a href="{{NEXT_HREF}}" id="nextDay">Next →</a>
      </div>
    </article>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-logo"><span class="sitename">TheWrkShop</span></div>
      <p>&copy; 2026 <span class="sitename">TheWrkShop</span>. All rights reserved.</p>
    </div>
  </footer>

  <script src="../script.js"></script>
</body>
</html>
